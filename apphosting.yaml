# Firebase App Hosting config for JSK Admin (Next.js on Cloud Run)
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 4
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Set NEXT_PUBLIC_FIREBASE_* in the Firebase Console (Build + Runtime) or via:
#   firebase apphosting:secrets:set NEXT_PUBLIC_FIREBASE_API_KEY
# Create secrets first, then grant access:
#   firebase apphosting:secrets:grantaccess --backend jsk-admin

env:
  - variable: AUTH_SECRET
    secret: AUTH_SECRET
    availability:
      - BUILD
      - RUNTIME
  - variable: ADMIN_USERNAME
    secret: ADMIN_USERNAME
    availability:
      - RUNTIME
  - variable: ADMIN_PASSWORD
    secret: ADMIN_PASSWORD
    availability:
      - RUNTIME
  - variable: GOOGLE_MAPS_API_KEY
    secret: GOOGLE_MAPS_API_KEY
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME
